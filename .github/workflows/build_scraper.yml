name: Build Scraper

on:
  push:
    branches:
      - main
    paths:
      - .github/scraper-image-version.txt
      - dockerfile
      - pyproject.toml
      - poetry.lock
      - src/**
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Scraper
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Resolve scraper image
        id: scraper_image
        run: |
          VERSION=$(tr -d '[:space:]' < .github/scraper-image-version.txt)
          if ! echo "$VERSION" | grep -Eq '^[0-9]+$'; then
            echo "Expected numeric scraper image version, got: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=registry.digitalocean.com/sendouq/scraper:v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Install Docker
        uses: docker/setup-buildx-action@v1

      - name: Build docker image
        run: docker build -t "scraper:v${{ steps.scraper_image.outputs.version }}" -f dockerfile .

      - name: Authenticate to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 300

      - name: Tag docker image
        run: |
          docker tag "scraper:v${{ steps.scraper_image.outputs.version }}" "${{ steps.scraper_image.outputs.image }}"

      - name: Push docker image
        run: |
          docker push "${{ steps.scraper_image.outputs.image }}"
